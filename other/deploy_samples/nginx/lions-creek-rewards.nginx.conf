# /etc/nginx/sites-available/lions-creek-rewards
# Reverse proxy for Lions Creek Rewards (React Router SSR on localhost:3000).
# Replace server_name with your production domain.
server {
  listen 80;
  server_name rewards.yourdomain.com;

  # Keep job endpoints local-only. The systemd timer should call localhost directly.
  location /jobs/ {
    allow 127.0.0.1;
    deny all;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
