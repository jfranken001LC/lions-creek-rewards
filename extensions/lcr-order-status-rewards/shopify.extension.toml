api_version = "2026-01"

[[extensions]]
uid = "c7a3f52c-7b2b-4c64-bf2c-2a8e6b0d8f22"
type = "ui_extension"
name = "lcr-order-status-rewards"
handle = "lcr-order-status-rewards"

[[extensions.targeting]]
module = "./src/index.tsx"
target = "customer-account.order-status.block.render"

[extensions.capabilities]
api_access = true
network_access = true

[[extensions.settings.fields]]
key = "app_base_url"
name = "App base URL"
type = "single_line_text_field"
description = "Required. Public HTTPS base URL of this app, with no trailing slash. This block calls /api/order/rewards on this host. Example: https://rewards.example.com"

[[extensions.settings.fields]]
key = "rewards_page_url"
name = "Rewards page URL (optional override)"
type = "single_line_text_field"
description = "Optional full URL to the Rewards page in customer accounts. Leave blank to use extension:lcr-loyalty-dashboard/. Only set this when your storefront uses a custom accounts domain, market prefix, or redirect pattern."
