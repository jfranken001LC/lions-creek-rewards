api_version = "2026-01"

[[extensions]]

uid = "a63729b7-9ab6-9ea6-a95f-8e942344efb1cf5ed67d"
type = "ui_extension"
name = "lcr-loyalty-dashboard"
handle = "lcr-loyalty-dashboard"

[[extensions.targeting]]
module = "./src/index.tsx"
target = "customer-account.page.render"


[extensions.targeting.capabilities]
allow_direct_linking = true

[extensions.capabilities]
api_access = true
network_access = true

[[extensions.settings.fields]]
key = "app_base_url"
name = "App base URL"
type = "single_line_text_field"
description = "Required. Public HTTPS base URL of this app, with no trailing slash. The Rewards page calls /api/customer/* on this host. Example: https://rewards.example.com"
